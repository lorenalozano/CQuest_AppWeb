services:
  backend:
    build: ./backend
    container_name: cquest_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./cquest.db
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on: []
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: cquest_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
